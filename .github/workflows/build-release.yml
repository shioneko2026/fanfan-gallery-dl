name: Build Release

# Triggers when a tag is pushed (e.g. git tag v0.9.0 && git push --tags)
# Builds FanFan Gallery-DL.exe with PyInstaller and uploads it to the release.
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller fanfan.spec

      - name: Upload .exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FanFan Gallery-DL.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
